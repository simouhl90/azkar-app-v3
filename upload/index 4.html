<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكار المسلم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A356;
            --gold-light: #E8D5A3;
            --dark-green: #0D3B2E;
            --green: #1A5C42;
            --light-green: #2D8B66;
            --cream: #FDF8F0;
            --warm-bg: #F5EFE3;
            --text-dark: #2C2C2C;
            --text-muted: #6B6B6B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background: var(--warm-bg);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-amiri { font-family: 'Amiri', serif; }

        /* Islamic geometric pattern background */
        .islamic-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23C5A356' stroke-width='0.5'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z'/%3E%3Cpath d='M40 10L70 40L40 70L10 40Z'/%3E%3Cpath d='M40 20L60 40L40 60L20 40Z'/%3E%3Ccircle cx='40' cy='40' r='8'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Glowing orb decoration */
        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb-1 { background: var(--gold); top: -100px; right: -100px; }
        .glow-orb-2 { background: var(--green); bottom: -150px; left: -100px; }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--green) 50%, var(--dark-green) 100%);
            position: relative;
            overflow: hidden;
        }
        .app-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23C5A356' stroke-width='0.3' opacity='0.3'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z'/%3E%3Cpath d='M30 12L48 30L30 48L12 30Z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .header-crescent {
            width: 60px; height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .header-crescent::after {
            content: '';
            width: 48px; height: 48px;
            background: var(--dark-green);
            border-radius: 50%;
            position: absolute;
            right: -4px;
        }
        .star-icon {
            position: relative;
            z-index: 2;
            color: var(--gold);
            font-size: 14px;
        }

        /* Category cards */
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(197, 163, 86, 0.15);
            position: relative;
            overflow: hidden;
        }
        .category-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--light-green));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .category-card:hover::before,
        .category-card:active::before {
            transform: scaleX(1);
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(13, 59, 46, 0.12);
            border-color: rgba(197, 163, 86, 0.3);
        }
        .category-card:active {
            transform: translateY(-1px) scale(0.98);
        }
        .category-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin: 0 auto 12px;
            transition: transform 0.3s ease;
        }
        .category-card:hover .category-icon {
            transform: scale(1.1) rotate(3deg);
        }

        /* Azkar list page */
        .azkar-page {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--warm-bg);
            z-index: 50;
            overflow-y: auto;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .azkar-page.active { display: flex; flex-direction: column; }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(30px); opacity: 0; }
        }

        /* Zikr card */
        .zikr-card {
            background: white;
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(197, 163, 86, 0.12);
            position: relative;
            transition: all 0.3s ease;
        }
        .zikr-card.completed {
            opacity: 0.45;
            border-color: rgba(45, 139, 102, 0.2);
        }
        .zikr-card.completed .zikr-text {
            text-decoration: line-through;
            text-decoration-color: var(--light-green);
        }

        .zikr-text {
            font-family: 'Amiri', serif;
            font-size: 22px;
            line-height: 2;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 20px;
        }
        .zikr-reference {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px dashed rgba(197, 163, 86, 0.2);
        }

        /* Counter button */
        .counter-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--dark-green), var(--green));
            border: 3px solid var(--gold);
            color: white;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .counter-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(197, 163, 86, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        .counter-btn:active::before {
            width: 120px; height: 120px;
        }
        .counter-btn:active {
            transform: scale(0.92);
        }
        .counter-btn.done {
            background: linear-gradient(135deg, var(--light-green), #34D399);
            border-color: #6EE7B7;
        }

        /* Progress ring */
        .progress-ring-container {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto;
        }
        .progress-ring {
            transform: rotate(-90deg);
        }
        .progress-ring-bg {
            fill: none;
            stroke: rgba(197, 163, 86, 0.15);
            stroke-width: 6;
        }
        .progress-ring-fill {
            fill: none;
            stroke: var(--gold);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(197, 163, 86, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Completion animation */
        @keyframes checkPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .check-anim {
            animation: checkPop 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark-green);
            color: var(--gold-light);
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(197, 163, 86, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(197, 163, 86, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(197, 163, 86, 0.5); }

        /* Back button */
        .back-btn {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(197, 163, 86, 0.2);
            color: var(--gold-light);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 18px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        /* Stats bar */
        .stats-bar {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(197, 163, 86, 0.12);
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid rgba(197, 163, 86, 0.15);
            z-index: 40;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
        }
        .nav-item {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
        }
        .nav-item.active {
            color: var(--dark-green);
        }
        .nav-item.active .nav-icon-wrap {
            background: linear-gradient(135deg, var(--dark-green), var(--green));
            color: white;
        }
        .nav-icon-wrap {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            background: rgba(13, 59, 46, 0.06);
        }

        /* Favorites page */
        .fav-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* Tasbeeh page */
        .tasbeeh-display {
            font-size: 72px;
            font-weight: 700;
            color: var(--dark-green);
            line-height: 1;
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        .tasbeeh-btn {
            width: 160px; height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--green) 60%, var(--light-green) 100%);
            border: 4px solid var(--gold);
            color: white;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 8px 40px rgba(13, 59, 46, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .tasbeeh-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 20px rgba(13, 59, 46, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .tasbeeh-select {
            background: white;
            border: 2px solid rgba(197, 163, 86, 0.2);
            border-radius: 12px;
            padding: 10px 16px;
            font-family: 'Noto Kufi Arabic', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            max-width: 300px;
        }
        .tasbeeh-select:focus { border-color: var(--gold); }

        /* Fade in animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        @media (max-width: 640px) {
            .zikr-text { font-size: 19px; line-height: 1.9; }
            .counter-btn { width: 68px; height: 68px; font-size: 24px; }
            .tasbeeh-btn { width: 140px; height: 140px; }
            .tasbeeh-display { font-size: 56px; }
        }
    </style>
</head>
<body>

<div class="islamic-pattern"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<!-- Main Home Page -->
<div id="homePage" style="position: relative; z-index: 1; padding-bottom: 80px;">

    <!-- Header -->
    <header class="app-header px-5 pt-8 pb-10 text-center">
        <div class="flex items-center justify-center gap-4 mb-4">
            <div class="header-crescent">
                <span class="star-icon">★</span>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white mb-1" style="font-family: 'Amiri', serif;">أذكار المسلم</h1>
                <p class="text-sm" style="color: var(--gold-light); opacity: 0.8;">حصّن نفسك بذكر الله</p>
            </div>
        </div>

        <!-- Date -->
        <div class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(197,163,86,0.15);">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--gold-light);"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span id="currentDate" class="text-sm" style="color: var(--gold-light);"></span>
        </div>
    </header>

    <!-- Stats -->
    <div class="px-5 -mt-5 relative z-10 mb-6">
        <div class="stats-bar flex items-center justify-between">
            <div class="text-center flex-1">
                <div class="text-xl font-bold" style="color: var(--dark-green);" id="totalAzkar">0</div>
                <div class="text-xs mt-1" style="color: var(--text-muted);">أذكار اليوم</div>
            </div>
            <div style="width:1px; height:36px; background: rgba(197,163,86,0.15);"></div>
            <div class="text-center flex-1">
                <div class="text-xl font-bold" style="color: var(--gold);" id="streakDays">0</div>
                <div class="text-xs mt-1" style="color: var(--text-muted);">أيام متتالية</div>
            </div>
            <div style="width:1px; height:36px; background: rgba(197,163,86,0.15);"></div>
            <div class="text-center flex-1">
                <div class="text-xl font-bold" style="color: var(--light-green);" id="totalAllTime">0</div>
                <div class="text-xs mt-1" style="color: var(--text-muted);">إجمالي الأذكار</div>
            </div>
        </div>
    </div>

    <!-- Categories -->
    <div class="px-5 mb-6">
        <h2 class="text-lg font-bold mb-4" style="color: var(--text-dark);">الأذكار</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="categoriesGrid">
        </div>
    </div>

    <!-- Quick Access -->
    <div class="px-5 mb-6">
        <h2 class="text-lg font-bold mb-4" style="color: var(--text-dark);">وصول سريع</h2>
        <div class="space-y-3" id="quickAccess">
        </div>
    </div>
</div>

<!-- Azkar Detail Page -->
<div id="azkarPage" class="azkar-page">
    <div class="app-header px-5 pt-6 pb-6 flex items-center gap-3" style="position: sticky; top: 0; z-index: 10;">
        <button class="back-btn" onclick="closeAzkarPage()" aria-label="رجوع">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <div class="flex-1">
            <h2 id="azkarPageTitle" class="text-lg font-bold text-white" style="font-family: 'Amiri', serif;"></h2>
            <p id="azkarPageCount" class="text-xs mt-1" style="color: var(--gold-light); opacity: 0.8;"></p>
        </div>
        <div class="progress-ring-container" style="width: 52px; height: 52px;">
            <svg class="progress-ring" width="52" height="52" viewBox="0 0 52 52">
                <circle class="progress-ring-bg" cx="26" cy="26" r="22"/>
                <circle class="progress-ring-fill" id="pageProgress" cx="26" cy="26" r="22"
                    stroke-dasharray="138.23" stroke-dashoffset="138.23"/>
            </svg>
            <div class="progress-text">
                <span id="pageProgressText" class="text-xs font-bold" style="color: var(--gold-light);">0%</span>
            </div>
        </div>
    </div>
    <div class="flex-1 px-5 pt-4 pb-24" id="azkarList"></div>
</div>

<!-- Tasbeeh Page -->
<div id="tasbeehPage" class="azkar-page">
    <div class="app-header px-5 pt-6 pb-6" style="position: sticky; top: 0; z-index: 10;">
        <div class="flex items-center gap-3">
            <button class="back-btn" onclick="closeTasbeehPage()" aria-label="رجوع">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <h2 class="text-lg font-bold text-white" style="font-family: 'Amiri', serif;">السبحة الإلكترونية</h2>
        </div>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center px-5 pb-24" style="min-height: calc(100vh - 80px);">
        <div class="text-center mb-8">
            <div class="tasbeeh-display mb-2" id="tasbeehCount">0</div>
            <div class="text-sm" style="color: var(--text-muted);">عدد التسبيحات</div>
        </div>

        <div class="mb-8">
            <select class="tasbeeh-select" id="tasbeehType" onchange="changeTasbeehType()">
                <option value="سبحان الله">سبحان الله</option>
                <option value="الحمد لله">الحمد لله</option>
                <option value="الله أكبر">الله أكبر</option>
                <option value="لا إله إلا الله">لا إله إلا الله</option>
                <option value="أستغفر الله">أستغفر الله</option>
                <option value="لا حول ولا قوة إلا بالله">لا حول ولا قوة إلا بالله</option>
                <option value="سبحان الله وبحمده">سبحان الله وبحمده</option>
                <option value="سبحان الله وبحمده سبحان الله العظيم">سبحان الله وبحمده، سبحان الله العظيم</option>
            </select>
        </div>

        <button class="tasbeeh-btn" id="tasbeehBtn" onclick="tasbeehTap()">
            <span id="tasbeehLabel" class="font-amiri text-lg">سبحان الله</span>
        </button>

        <div class="flex items-center gap-6 mt-10">
            <button onclick="resetTasbeeh()" class="flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-medium transition-all hover:scale-105" style="background: white; border: 1px solid rgba(197,163,86,0.2); color: var(--text-muted);">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                إعادة تعيين
            </button>
            <button onclick="setTasbeehTarget()" class="flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-medium transition-all hover:scale-105" style="background: var(--dark-green); color: var(--gold-light);">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                تحديد هدف
            </button>
        </div>

        <div id="tasbeehTargetInfo" class="mt-6 text-center hidden">
            <div class="text-sm" style="color: var(--text-muted);">الهدف: <span id="tasbeehTargetNum" class="font-bold" style="color: var(--dark-green);"></span></div>
            <div class="w-48 h-2 rounded-full mt-2 mx-auto" style="background: rgba(197,163,86,0.15);">
                <div id="tasbeehTargetBar" class="h-2 rounded-full transition-all duration-300" style="background: linear-gradient(90deg, var(--gold), var(--light-green)); width: 0%;"></div>
            </div>
        </div>
    </div>
</div>

<!-- Favorites Page -->
<div id="favPage" class="azkar-page">
    <div class="app-header px-5 pt-6 pb-6" style="position: sticky; top: 0; z-index: 10;">
        <div class="flex items-center gap-3">
            <button class="back-btn" onclick="closeFavPage()" aria-label="رجوع">

function renderDate() {

    const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    document.getElementById('currentDate').textContent = `${days[now.getDay()]}، ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function renderCategories() {
    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '';
    const keys = Object.keys(azkarData);
    keys.forEach((key, i) => {
        const cat = azkarData[key];
        const card = document.createElement('div');
        card.className = 'category-card fade-in-up';
        card.style.animationDelay = `${i * 0.08}s`;
        card.onclick = () => openAzkarPage(key);
        card.innerHTML = `
            <div class="category-icon" style="background: ${cat.bgColor};">${cat.icon}</div>
            <div class="text-sm font-bold text-center" style="color: var(--text-dark);">${cat.title}</div>
            <div class="text-xs text-center mt-1" style="color: var(--text-muted);">${cat.azkar.length} ذكر</div>
        `;
        grid.appendChild(card);
    });
}

        div.innerHTML = `
            <div class="w-11 h-11 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background: var(--warm-bg);">${item.icon}</div>
            <div class="font-amiri text-sm flex-1" style="color: var(--text-dark); line-height: 1.6;">${item.text}</div>

// ==================== AZKAR PAGE ====================
function openAzkarPage(catKey, scrollToIndex) {
    currentCategory = catKey;
    const cat = azkarData[catKey];
    document.getElementById('azkarPageTitle').textContent = cat.title;
    document.getElementById('azkarPageCount').textContent = `${cat.azkar.length} ذكر`;

    // Initialize state
    if (!zikrStates[catKey]) {
        zikrStates[catKey] = cat.azkar.map(z => ({ remaining: z.count, completed: false }));
    }

    renderAzkarList();
    updatePageProgress();

    document.getElementById('azkarPage').classList.add('active');
    document.getElementById('bottomNav').style.display = 'none';

    if (scrollToIndex !== undefined) {
        setTimeout(() => {
            const cards = document.querySelectorAll('.zikr-card');
            if (cards[scrollToIndex]) {
                cards[scrollToIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                cards[scrollToIndex].style.boxShadow = '0 0 0 3px var(--gold)';
                setTimeout(() => { cards[scrollToIndex].style.boxShadow = ''; }, 2000);
            }
        }, 400);
    }
}

function renderAzkarList() {
    const cat = azkarData[currentCategory];
    const state = zikrStates[currentCategory];
    const list = document.getElementById('azkarList');
    list.innerHTML = '';

    cat.azkar.forEach((zikr, i) => {
        const s = state[i];
        const isFav = favorites.some(f => f.cat === currentCategory && f.index === i);
        const card = document.createElement('div');
        card.className = `zikr-card fade-in-up ${s.completed ? 'completed' : ''}`;
        card.style.animationDelay = `${i * 0.06}s`;
        card.id = `zikr-${i}`;

        const remainingDisplay = zikr.count > 1 ? `${s.remaining} / ${zikr.count}` : (s.completed ? '✓' : '1');
        const btnClass = s.completed ? 'counter-btn done' : 'counter-btn';
        const btnContent = s.completed ? '<span class="check-anim">✓</span>' : remainingDisplay;

        card.innerHTML = `
            <button class="absolute top-3 left-3 w-9 h-9 rounded-full flex items-center justify-center transition-all hover:scale-110" style="background: ${isFav ? 'rgba(197,163,86,0.15)' : 'rgba(0,0,0,0.03)'};" onclick="event.stopPropagation(); toggleFavorite('${currentCategory}', ${i})" aria-label="إضافة للمفضلة">
                <svg width="16" height="16" fill="${isFav ? 'var(--gold)' : 'none'}" stroke="${isFav ? 'var(--gold)' : 'var(--text-muted)'}" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
            <div class="zikr-text">${zikr.text}</div>
            <div class="zikr-reference">${zikr.ref}</div>
            <div class="flex items-center justify-center">
                <button class="${btnClass}" onclick="tapZikr(${i})" ${s.completed ? 'disabled' : ''} aria-label="تسبيح">
                    <span class="relative z-10">${btnContent}</span>
                </button>
            </div>
        `;
        list.appendChild(card);
    });
}

function tapZikr(index) {
    const state = zikrStates[currentCategory][index];
    if (state.completed) return;

    state.remaining--;

    // Vibrate if available
    if (navigator.vibrate) navigator.vibrate(20);

    // Increment stats
    stats.today++;
    stats.allTime++;
    saveStats();

    if (state.remaining <= 0) {
        state.completed = true;
        state.remaining = 0;
        showToast('✅ تم الانتهاء من هذا الذكر');
    }

    renderAzkarList();
    updatePageProgress();
    updateStats();
}

function updatePageProgress() {
    const state = zikrStates[currentCategory];
    const total = state.length;
    const done = state.filter(s => s.completed).length;
    const pct = Math.round((done / total) * 100);
    const circumference = 2 * Math.PI * 22;
    const offset = circumference - (pct / 100) * circumference;

    document.getElementById('pageProgress').style.strokeDashoffset = offset;
    document.getElementById('pageProgressText').textContent = `${pct}%`;

    if (done === total && total > 0) {
        setTimeout(() => showToast('🌟 ما شاء الله! أكملت جميع الأذكار'), 500);
    }
}

function closeAzkarPage() {
    const page = document.getElementById('azkarPage');
    page.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => {
        page.classList.remove('active');
        page.style.animation = '';
        document.getElementById('bottomNav').style.display = '';
        currentCategory = null;
    }, 300);
}

// ==================== TASBEEH ====================
function openTasbeehPage() {
    document.getElementById('tasbeehPage').classList.add('active');
    document.getElementById('bottomNav').style.display = 'none';
    updateTasbeehDisplay();
}

function closeTasbeehPage() {
    const page = document.getElementById('tasbeehPage');
    page.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => {
        page.classList.remove('active');
        page.style.animation = '';
        document.getElementById('bottomNav').style.display = '';
    }, 300);
}

function tasbeehTap() {
    tasbeehCount++;
    if (navigator.vibrate) navigator.vibrate(15);

    // Visual feedback
    const btn = document.getElementById('tasbeehBtn');
    btn.style.transform = 'scale(0.93)';
    setTimeout(() => { btn.style.transform = ''; }, 100);

    stats.today++;
    stats.allTime++;
    saveStats();
    updateStats();
    updateTasbeehDisplay();

    if (tasbeehTarget > 0 && tasbeehCount >= tasbeehTarget) {
        showToast('🎉 أحسنت! وصلت إلى هدفك');
    }
}

function updateTasbeehDisplay() {
    document.getElementById('tasbeehCount').textContent = tasbeehCount;
    const label = document.getElementById('tasbeehType').value;
    document.getElementById('tasbeehLabel').textContent = label.length > 20 ? label.substring(0, 20) + '...' : label;

    if (tasbeehTarget > 0) {
        document.getElementById('tasbeehTargetInfo').classList.remove('hidden');
        document.getElementById('tasbeehTargetNum').textContent = tasbeehTarget;
        const pct = Math.min((tasbeehCount / tasbeehTarget) * 100, 100);
        document.getElementById('tasbeehTargetBar').style.width = pct + '%';
    }
}

function changeTasbeehType() {
    tasbeehCount = 0;
    updateTasbeehDisplay();
}

function resetTasbeeh() {
    tasbeehCount = 0;
    tasbeehTarget = 0;
    document.getElementById('tasbeehTargetInfo').classList.add('hidden');
    updateTasbeehDisplay();
    showToast('تم إعادة التعيين');
}

function setTasbeehTarget() {
    const targets = [33, 99, 100, 500, 1000];
    const current = targets.indexOf(tasbeehTarget);
    tasbeehTarget = targets[(current + 1) % targets.length];
    tasbeehCount = 0;
    updateTasbeehDisplay();
    showToast(`تم تحديد الهدف: ${tasbeehTarget}`);
}

// ==================== FAVORITES ====================
function toggleFavorite(cat, index) {
    const idx = favorites.findIndex(f => f.cat === cat && f.index === index);
    if (idx > -1) {
        favorites.splice(idx, 1);
        showToast('تم الإزالة من المفضلة');
    } else {
        favorites.push({ cat, index });
        showToast('♡ تمت الإضافة للمفضلة');
    }
    localStorage.setItem('azkarFavorites', JSON.stringify(favorites));
    if (currentCategory) renderAzkarList();
    if (document.getElementById('favPage').classList.contains('active')) renderFavorites();
}

function openFavPage() {
    document.getElementById('favPage').classList.add('active');
    document.getElementById('bottomNav').style.display = 'none';
    renderFavorites();
}

function closeFavPage() {
    const page = document.getElementById('favPage');
    page.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => {
        page.classList.remove('active');
        page.style.animation = '';
        document.getElementById('bottomNav').style.display = '';
    }, 300);
}

function renderFavorites() {
    const list = document.getElementById('favList');
    if (favorites.length === 0) {
        list.innerHTML = `
            <div class="fav-empty">
                <div class="text-5xl mb-4">♡</div>
                <div class="text-lg font-bold mb-2">لا توجد أذكار مفضلة</div>
                <div class="text-sm" style="color: var(--text-muted);">اضغط على أيقونة القلب بجانب أي ذكر لإضافته هنا</div>
            </div>
        `;
        return;
    }
    list.innerHTML = '';
    favorites.forEach((fav, i) => {
        const zikr = azkarData[fav.cat].azkar[fav.index];
        const div = document.createElement('div');
        div.className = 'zikr-card fade-in-up';
        div.style.animationDelay = `${i * 0.06}s`;
        div.innerHTML = `
            <div class="text-xs font-medium mb-2 px-3 py-1 rounded-full inline-block" style="background: ${azkarData[fav.cat].bgColor}; color: ${azkarData[fav.cat].color};">${azkarData[fav.cat].title}</div>
            <div class="zikr-text" style="font-size: 20px;">${zikr.text}</div>
            <div class="zikr-reference">${zikr.ref} • العدد: ${zikr.count}</div>
            <div class="flex justify-center mt-2">
                <button onclick="toggleFavorite('${fav.cat}', ${fav.index})" class="text-xs px-4 py-2 rounded-full transition-all hover:scale-105" style="background: rgba(239,68,68,0.08); color: #EF4444;">إزالة من المفضلة</button>
            </div>
        `;
        list.appendChild(div);
    });
}

// ==================== NAVIGATION ====================
function switchTab(tab) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (tab === 'home') {
        document.getElementById('navHome').classList.add('active');
    } else if (tab === 'tasbeeh') {
        document.getElementById('navTasbeeh').classList.add('active');
        openTasbeehPage();
        return;
    } else if (tab === 'fav') {
        document.getElementById('navFav').classList.add('active');
        openFavPage();
        return;
    }
}

// ==================== STATS ====================
function updateStats() {
    document.getElementById('totalAzkar').textContent = stats.today;
    document.getElementById('streakDays').textContent = stats.streak;
    document.getElementById('totalAllTime').textContent = stats.allTime;
}

function saveStats() {
    const today = new Date().toDateString();
    if (stats.lastDate !== today) {
        stats.today = 1;
        stats.lastDate = today;
    }
    localStorage.setItem('azkarStats', JSON.stringify(stats));
}

function checkStreak() {
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();

    if (stats.lastDate === today) {
        // Same day, keep count
    } else if (stats.lastDate === yesterday) {
        // Next day, keep streak
        stats.streak++;
        stats.today = 0;
        stats.lastDate = today;
        saveStats();
    } else if (stats.lastDate && stats.lastDate !== today) {
        // Streak broken
        stats.streak = 1;
        stats.today = 0;
        stats.lastDate = today;
        saveStats();
    } else {
        // First time
        stats.streak = 1;
        stats.lastDate = today;
        saveStats();
    }
    updateStats();
}

// ==================== TOAST ====================
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== PARTICLES ====================
function initParticles() {
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (prefersReduced) return;

    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.width = (2 + Math.random() * 3) + 'px';
        p.style.height = p.style.width;
        p.style.animation = `floatParticle ${8 + Math.random() * 12}s ease-in-out infinite`;
        p.style.animationDelay = `${Math.random() * 5}s`;
        document.body.appendChild(p);
    }

    const style = document.createElement('style');
    style.textContent = `
        @keyframes floatParticle {
            0%, 100% { opacity: 0; transform: translateY(0) translateX(0); }
            25% { opacity: 0.3; }
            50% { opacity: 0.15; transform: translateY(-60px) translateX(20px); }
            75% { opacity: 0.25; }
        }
    `;
    document.head.appendChild(style);
}

// ==================== START ====================
document.addEventListener('DOMContentLoaded', init);
</script>
